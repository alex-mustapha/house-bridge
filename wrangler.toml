name = "linear-discord-bridge"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Daily digest + recurring-chore creation.
# IMPORTANT: Cloudflare cron is UTC and does NOT observe daylight saving.
# "0 12 * * *" = 8:00am EDT (summer) / 7:00am EST (winter) for US Eastern.
# If you'd rather hold a steady 8am through winter, switch to "0 13 * * *"
# when EST starts (early November) and back to "0 12 * * *" in March.
[triggers]
crons = ["0 12 * * *"]

# Non-secret config. Secrets (API keys, webhook URLs) are set via
# `wrangler secret put NAME` — see README.
[vars]
# How many days ahead the daily digest looks. 0 = only today + overdue.
DUE_LOOKAHEAD_DAYS = "0"
# Warn in #bot-log once active (non-archived) issues reach this count.
# Free plan caps at 250; 220 gives you runway to archive.
CAP_WARN_AT = "220"
# Linear project that holds recurring-chore template tickets.
RECURRING_PROJECT = "Recurring"
# Team key used for the weekly scoreboard.
CHORES_TEAM = "CHO"
# Project that spawned chores are created in (and tracked under).
CHORES_PROJECT = "House Chores"
# Rotation load skew: higher weight = bigger share of the week's chore minutes.
# Per-person overrides set via `/chores weight` (D1) take precedence.
ROTATION_WEIGHTS = "Alex:60,Kristal:40"
# Title of a no-cadence template in the Recurring project to spawn (due at the
# pause start) whenever a whole-household /chores pause is set — e.g. a trip
# prep checklist. Leave the template absent to skip this.
VACATION_PREP_TITLE = "Vacation Prep"
# Channel the daily digest is posted to BY THE BOT (so it can carry "Done"
# buttons). #due-today. Requires the DISCORD_BOT_TOKEN secret + the bot having
# Send Messages here. If unset, the digest falls back to the DUE webhook.
DISCORD_DUE_CHANNEL_ID = "1519809360170324069"

# D1 database for long-term chore analytics (free tier).
[[d1_databases]]
binding = "DB"
database_name = "chore-stats"
database_id = "1f02a152-b650-443e-adb4-b9c71b8b9516"
